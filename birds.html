<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bird Viewer</title>

    <style>
      /* ===== Theme palettes (5 colours each) ===== */
      :root {
        /* LIGHT theme */
        --primary-color: #1f6feb;
        --secondary-color: #2ea043;
        --bg-color: #ffffff;
        --font-color: #1f2328;
        --heading-color: #0b3d91;
      }

      [data-theme="dark"] {
        /* DARK theme */
        --primary-color: #58a6ff;
        --secondary-color: #3fb950;
        --bg-color: #0d1117;
        --font-color: #c9d1d9;
        --heading-color: #f0f6fc;
      }

      /* ===== Page styling using variables ===== */
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg-color);
        color: var(--font-color);
        line-height: 1.5;
      }

      header {
        padding: 20px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      header h1 {
        margin: 0;
        color: var(--heading-color);
        font-size: 1.4rem;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
      }

      button {
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: transparent;
        color: var(--font-color);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--primary-color);
      }

      button.primary {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
      }

      button.primary:hover {
        filter: brightness(0.95);
      }

      .viewer {
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 14px;
        padding: 14px;
      }

      img {
        display: block;
        width: 100%;
        max-width: 700px;
        height: auto;
        border-radius: 12px;
        border: 2px solid rgba(127, 127, 127, 0.25);
      }

      p {
        margin: 10px 0 0;
        color: var(--font-color);
      }

      .hint {
        margin-top: 14px;
        color: rgba(127, 127, 127, 0.9);
        font-size: 0.95rem;
      }

      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        background: rgba(127, 127, 127, 0.15);
        margin-left: 8px;
        font-size: 0.85rem;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>
        Bird Image Selector
        <span class="badge" id="themeBadge">Theme: Light</span>
      </h1>

      <!-- REQUIRED: A button to toggle theme -->
      <button class="primary" id="toggleThemeBtn" type="button">Toggle Theme</button>
    </header>

    <main>
      <!-- REQUIRED: 5 buttons with bird names -->
      <section class="controls" aria-label="Bird selection buttons">
        <button type="button" class="birdBtn" data-bird="pardalote">Pardalote</button>
        <button type="button" class="birdBtn" data-bird="swamphen">Purple Swamp Hen</button>
        <button type="button" class="birdBtn" data-bird="stilt">White-headed Stilt</button>
        <button type="button" class="birdBtn" data-bird="thornbill">Inland Thornbill</button>
        <button type="button" class="birdBtn" data-bird="robin">Rose Robin</button>
      </section>

      <!-- REQUIRED: one img above one p -->
      <section class="viewer">
        <img id="birdImage" src="" alt="Selected bird" />
        <p id="birdCaption"></p>
      </section>

      <p class="hint">
        Click a bird button to change the image and photographer credit. Use “Toggle Theme” to switch styles.
      </p>
    </main>

    <script>
      // Bird data (matches your table exactly)
      const birds = {
        pardalote: {
          name: "Pardalote",
          img: "http://www.outgrabe.net/bird00.jpg",
          text: "Pardalote by fir0002 (CC-by-NC)",
        },
        swamphen: {
          name: "Purple Swamp Hen",
          img: "http://www.outgrabe.net/bird01.jpg",
          text: "Purple swamp hen by Toby Hudson (CC-by-SA)",
        },
        stilt: {
          name: "White-headed Stilt",
          img: "http://www.outgrabe.net/bird02.jpg",
          text: "White-headed Stilt by JJ Harrison (CC-by-SA)",
        },
        thornbill: {
          name: "Inland Thornbill",
          img: "http://www.outgrabe.net/bird03.jpg",
          text: "Inland Thornbill by Peter Jacobs (CC-by-SA)",
        },
        robin: {
          name: "Rose Robin",
          img: "http://www.outgrabe.net/bird04.jpg",
          text: "Rose Robin by JJ Harrison (CC-by-SA)",
        },
      };

      const imgEl = document.getElementById("birdImage");
      const captionEl = document.getElementById("birdCaption");
      const buttons = document.querySelectorAll(".birdBtn");
      const toggleThemeBtn = document.getElementById("toggleThemeBtn");
      const themeBadge = document.getElementById("themeBadge");

      function showBird(key) {
        const bird = birds[key];
        imgEl.src = bird.img;
        imgEl.alt = bird.name;
        captionEl.textContent = bird.text;
      }

      // Default bird (allowed: any one)
      showBird("pardalote");

      // Button click handlers
      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.getAttribute("data-bird");
          showBird(key);
        });
      });

      // Theme toggle
      function updateThemeLabel(theme) {
        themeBadge.textContent = theme === "dark" ? "Theme: Dark" : "Theme: Light";
      }

      toggleThemeBtn.addEventListener("click", () => {
        const htmlEl = document.documentElement;
        const current = htmlEl.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        htmlEl.setAttribute("data-theme", next);
        updateThemeLabel(next);
      });

      // Set label on load
      updateThemeLabel(document.documentElement.getAttribute("data-theme"));
    </script>
  </body>
</html>

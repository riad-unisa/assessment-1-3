<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bird Viewer</title>

    <style>
      /* ===== Theme palettes (5 colours each) ===== */
      :root {
        --primary-color: #1f6feb;
        --secondary-color: #22a043;
        --bg-color: #ffffff;
        --font-color: #1f2328;
        --heading-color: #0b3d91;
      }

      [data-theme="dark"] {
        --primary-color: #58a6ff;
        --secondary-color: #3fb950;
        --bg-color: #0d1117;
        --font-color: #c9d1d9;
        --heading-color: #f0f6fc;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg-color);
        color: var(--font-color);
        line-height: 1.5;
      }

      header {
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.25);
      }

      h1 {
        margin: 0;
        color: var(--heading-color);
        font-size: 1.4rem;
      }

      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      button {
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: transparent;
        color: var(--font-color);
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--primary-color);
      }

      .card {
        border: 1px solid rgba(127, 127, 127, 0.25);
        border-radius: 14px;
        padding: 14px;
      }

      img {
        display: block;
        width: 100%;
        max-width: 720px;
        height: auto;
        border-radius: 12px;
      }

      .credit {
        margin-top: 10px;
      }

      .hint {
        margin-top: 10px;
        color: rgba(127, 127, 127, 0.9);
        font-size: 0.95rem;
      }

      #toggleThemeBtn {
        border-color: var(--secondary-color);
        color: var(--secondary-color);
      }

      #toggleThemeBtn:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Bird Image Selector</h1>
      <button id="toggleThemeBtn" type="button">Toggle Theme</button>
    </header>

    <main>
      <div class="controls">
        <button type="button" data-bird="pardalote">Pardalote</button>
        <button type="button" data-bird="swamphen">Purple Swamp Hen</button>
        <button type="button" data-bird="stilt">White-headed Stilt</button>
        <button type="button" data-bird="thornbill">Inland Thornbill</button>
        <button type="button" data-bird="robin">Rose Robin</button>
      </div>

      <div class="card">
        <!-- Exactly ONE img and ONE p -->
        <img id="birdImg" src="http://www.outgrabe.net/bird00.jpg" alt="Pardalote" />
        <p id="birdCredit" class="credit">Pardalote by fir0002 (CC-by-NC)</p>
      </div>

      <p class="hint">
        Click a bird button to change the image and photographer credit. Use “Toggle Theme” to switch styles.
      </p>
    </main>

    <script>
      // Bird switching functionality
      const birds = {
        pardalote: {
          src: "http://www.outgrabe.net/bird00.jpg",
          alt: "Pardalote",
          credit: "Pardalote by fir0002 (CC-by-NC)",
        },
        swamphen: {
          src: "http://www.outgrabe.net/bird01.jpg",
          alt: "Purple Swamp Hen",
          credit: "Purple swamp hen by Toby Hudson (CC-by-SA)",
        },
        stilt: {
          src: "http://www.outgrabe.net/bird02.jpg",
          alt: "White-headed Stilt",
          credit: "White-headed Stilt by JJ Harrison (CC-by-SA)",
        },
        thornbill: {
          src: "http://www.outgrabe.net/bird03.jpg",
          alt: "Inland Thornbill",
          credit: "Inland Thornbill by Peter Jacobs (CC-by-SA)",
        },
        robin: {
          src: "http://www.outgrabe.net/bird04.jpg",
          alt: "Rose Robin",
          credit: "Rose Robin by JJ Harrison (CC-by-SA)",
        },
      };

      // Elements (must exist)
      const imgEl = document.getElementById("birdImg");
      const creditEl = document.getElementById("birdCredit");

      // Button click: change ONE img + ONE p
      document.querySelectorAll("button[data-bird]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.getAttribute("data-bird");
          const bird = birds[key];

          imgEl.src = bird.src;
          imgEl.alt = bird.alt;
          creditEl.textContent = bird.credit;
        });
      });
      // Theme toggle functionality
      // Theme toggle
      const toggleBtn = document.getElementById("toggleThemeBtn");
      toggleBtn.addEventListener("click", () => {
        const root = document.documentElement; // <html>
        const current = root.getAttribute("data-theme") || "light";
        root.setAttribute("data-theme", current === "dark" ? "light" : "dark");
      });
    </script>
  </body>
</html>
